services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    user: "0:0"
    cap_add:
      - NET_RAW
    env_file:
      - ../backend/.env
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "8181:80"
    restart: unless-stopped

volumes:
  backend_data:
  backend_logs: