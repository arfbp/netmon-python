[project]
name = "netmon-backend"
version = "0.1.0"
description = "Local Network Monitoring Dashboard — backend"
requires-python = ">=3.13"
readme = "README.md"

# ---------------------------------------------------------------------------
# Dependency policy:
#   - Pin with `>=` for libraries we track upstream (framework, driver),
#     but the lockfile (generated by `uv lock` / `pip-compile`) is what
#     actually pins exact versions for reproducible installs.
#   - Every dependency here must be justified below; no "just in case" deps.
# ---------------------------------------------------------------------------
dependencies = [
    "fastapi>=0.115",            # API framework, native Pydantic v2 + WebSocket support
    "uvicorn[standard]>=0.32",   # ASGI server (uvloop + httptools via [standard])
    "sqlalchemy>=2.0",           # ORM, async engine support (2.x style, no legacy Query API)
    "aiosqlite>=0.20",           # async SQLite driver for SQLAlchemy's async engine
    "alembic>=1.13",             # schema migrations — required for SQLite -> Postgres path
    "pydantic>=2.9",             # schemas/validation (Settings, DTOs, WS message contracts)
    "pydantic-settings>=2.5",    # typed env-var driven configuration (Step 2)
    "asyncpg>=0.29",             # Postgres async driver — inactive on SQLite, present so the
                                  # migration path in the README is not aspirational
    "icmplib>=3.0",              # privilege-friendly async ICMP ping (no raw-socket sudo dance
                                  # on Linux when capabilities are set; falls back cleanly)
    "netifaces2>=0.0.22",         # cross-platform default gateway detection (PING_GATEWAY_AUTO_DETECT).
                                  # Actively-maintained Rust-based fork of the abandoned `netifaces`;
                                  # ships prebuilt wheels for Linux/Windows/macOS, no local compiler
                                  # needed. Import name is still `netifaces` (drop-in compatible).
    "dnspython>=2.6",            # DNS monitor: explicit resolver control, timing, per-resolver
    "httpx>=0.27",               # HTTP monitor: async client with connect/TLS/TTFB timing hooks
    "speedtest-cli>=2.1",        # Speed Test monitor (wrapped, not shelled out to)
    "python-json-logger>=2.0",   # structured JSON logs (Step 2/logging)
    "websockets>=13.0",          # explicit WS protocol dep (FastAPI uses it transitively too)
    "tenacity>=9.0",             # retry/backoff for transient monitor failures, DRY vs. hand
                                  # rolled retry loops in every monitor
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",     # async test support (all monitors/services are async)
    "pytest-cov>=5.0",
    "httpx>=0.27",              # also used as the ASGI test client
    "ruff>=0.7",                # lint + format (replaces black+isort+flake8)
    "mypy>=1.13",                # static typing enforcement (see [tool.mypy])
    "pre-commit>=4.0",
    "faker>=30.0",               # deterministic fake data for repository/service tests
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

# ---------------------------------------------------------------------------
# Ruff: single tool for lint + format. Line length 100 (not 79/88) — long
# type hints on async repository methods get unreadable otherwise.
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 100
target-version = "py313"
src = ["app", "tests"]

[tool.ruff.lint]
select = [
    "E", "F", "W",     # pycodestyle/pyflakes core
    "I",                # isort (import ordering)
    "UP",               # pyupgrade — enforce modern 3.13 syntax
    "B",                # bugbear — common footguns (mutable defaults, etc.)
    "ASYNC",            # async-specific lint rules (blocking calls in async def, etc.)
    "SIM",              # simplify
    "N",                # pep8-naming
    "RUF",              # ruff-native rules
]
ignore = [
    "E501",  # line length handled by formatter, not linter
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"

# ---------------------------------------------------------------------------
# mypy: strict mode. "Type hints everywhere" from the brief is enforced,
# not just requested.
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.13"
strict = true
plugins = ["pydantic.mypy"]
exclude = ["alembic/"]

[[tool.mypy.overrides]]
module = ["icmplib.*", "speedtest.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra --cov=app --cov-report=term-missing"
